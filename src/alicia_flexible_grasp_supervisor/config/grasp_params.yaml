grasp:
  use_grasp6d_plan: true
  grasp6d_plan_topic: "/grasp_6d/plan"
  # Manual 6D debugging needs time for operator/log confirmation. Execution
  # still rejects the plan if the tracked object drifts too far.
  grasp6d_plan_max_age_sec: 600.0
  grasp6d_plan_max_object_drift_m: 0.02
  pregrasp_distance_m: 0.08
  # The Alicia tool0 frame points through the fingertips along +Z. After the
  # GraspNet grasp frame is aligned to tool0, all approach offsets must use Z.
  tool_approach_axis: "z"
  pregrasp_offset_mode: "camera_ray"
  final_approach_offset_m: 0.045
  approach_step_m: 0.002
  approach_rate_hz: 10
  lift_height_m: 0.05
  timeout_sec: 25.0
  default_orientation_xyzw: [0.0, 0.7071, 0.0, 0.7071]
  pregrasp_reached_tolerance_m: 0.04
  motion_settle_min_sec: 0.8
  # The hardware driver continues smoothing after FollowJointTrajectory reports
  # success. Do not start the next segment until real joint feedback is stable.
  motion_settle_timeout_sec: 5.0
  motion_settle_sample_sec: 0.05
  motion_settle_position_epsilon_rad: 0.0025
  motion_settle_required_samples: 3
  min_object_confidence: 0.50
  max_object_jump_m: 0.12
  object_jump_filter_window_sec: 4.0
  max_locked_target_refine_m: 0.06
  # Eye-in-hand closed loop: reobserve the target at pregrasp, translate the
  # remaining path from live RGB-D, and preserve the model-predicted 6D rotation.
  visual_retarget_enabled: true
  visual_retarget_require_start_detection: true
  # The current side-mounted camera cannot geometrically retain the object in
  # view at strict pregrasp. Reobserve there when possible, but do not fabricate
  # a detection when the gripper/camera layout causes expected occlusion.
  visual_retarget_require_pregrasp_detection: false
  visual_retarget_after_approach: true
  # Near contact the gripper can legitimately occlude the wrist camera. In that
  # case use the last trusted pregrasp target instead of pretending it is visible.
  visual_retarget_require_approach_detection: false
  visual_retarget_timeout_sec: 1.2
  visual_retarget_sample_sec: 0.05
  visual_retarget_required_samples: 3
  visual_retarget_raw_max_age_sec: 0.30
  visual_retarget_max_jitter_m: 0.012
  # A stationary target moving by more than 20 mm in base coordinates indicates
  # a loose camera or invalid hand-eye calibration, not normal tracking noise.
  visual_retarget_max_correction_m: 0.02
  visual_retarget_deadband_m: 0.002
  # Strict 6D mode: do not let MoveIt replace the model-predicted wrist
  # orientation with the current wrist orientation.
  accept_orientation_fallback: false

force:
  contact_threshold_mn: 200.0
  target_force_mn: 1500.0
  max_force_mn: 4000.0
  hold_force_min_mn: 800.0
  slip_drop_ratio: 0.30

gripper:
  # Alicia-D real gripper reports 0.05 m at the physically open posture and
  # 0.0 m at the closed posture.
  open_position_m: 0.05
  close_limit_m: 0.0
  close_step_fast_m: 0.002
  close_step_slow_m: 0.0007
  open_step_safe_m: 0.003
  command_rate_hz: 25
  # 夹爪未完成力/位置标定前，先使用固定开合，不走电子皮肤柔顺闭合。
  use_compliant_close: false
  simple_close_position_m: 0.0
  simple_close_wait_sec: 0.8
  open_wait_sec: 1.0
  hold_arm_during_gripper_commands: true
  arm_hold_timeout_sec: 0.5
  require_tactile_feedback: true
  tactile_feedback_timeout_sec: 1.0

grasp_6d:
  enabled: true
  backend: "remote_graspnet_baseline"
  root: ""
  checkpoint_path: ""
  device: "cpu"
  seed_feat_dim: 512
  num_points: 50000
  voxel_size: 0.005
  plan_hz: 1.0
  collision_thresh: 0.05
  collision_voxel_size: 0.01
  tactile_weight: 0.2
  remote:
    server_url: "http://172.23.132.97:8000"
    timeout_sec: 30.0
    auto_request: false
    request_hz: 0.05
    max_candidates: 120
    failure_backoff_sec: 10.0
    # GraspNet baseline predicts in OpenCV optical camera coordinates:
    # x right, y down, z forward. ROS-side planning uses camera_link.
    candidate_frame_convention: "opencv_optical"
    # GraspNet: +X approach, +Y jaw closing. Alicia tool0: +Z approach,
    # +Y jaw closing. Right-multiplying Ry(+90 deg) maps model axes to tool0.
    model_grasp_to_tool_rpy_deg: [0.0, 90.0, 0.0]
    # Baseline predictions contain insertion depth. Refuse an old WSL server
    # that silently drops it, because that hides an incomplete grasp geometry.
    require_candidate_depth: true
    # Strict 6D mode: reject candidates that are only reachable after replacing
    # the model-predicted orientation.
    accept_orientation_fallback: false
    # Use the current perception target bbox to mask RGB-D before remote 6D
    # inference; otherwise GraspNet may propose grasps on the table/background.
    use_perception_roi: true
    require_perception_roi: true
    perception_roi_margin_px: 12
    perception_roi_max_age_sec: 1.0
    perception_roi_min_valid_depth_px: 80
    # Reject remote 6D grasps that are reachable but do not land near the
    # current YOLO/perception target. This prevents table/background candidates
    # from being executed when the mouse bbox is large or includes clutter.
    candidate_target_gate_enabled: true
    candidate_max_target_distance_m: 0.04
    candidate_min_relative_z_m: -0.015
    candidate_max_relative_z_m: 0.08
    # Rank reachable candidates by consistency with the target foreground point
    # cloud instead of accepting the first IK-valid pose.
    rank_by_target_distance: true
    # Keep this disabled in strict evaluation. Target location must come from
    # RGB-D segmentation/candidate ranking, not from a fixed post-selection
    # position correction.
    target_position_refine_enabled: false
    target_position_refine_blend: 0.0
    target_position_refine_max_m: 0.04
    target_position_refine_max_age_sec: 1.0
    target_position_refine_offset_xyz_m: [0.0, 0.0, 0.0]
    # Use the YOLO ROI only as an object proposal, then segment the foreground
    # object from depth and compare 6D candidates against that 3D point cloud.
    target_cloud_enabled: true
    target_cloud_roi_margin_px: 0
    target_cloud_foreground_percentile: 35.0
    target_cloud_depth_window_m: 0.055
    target_cloud_min_points: 80
    target_cloud_max_age_sec: 1.0
    target_cloud_max_points_for_gate: 2500
    target_cloud_candidate_max_point_distance_m: 0.055
    target_projection_frame_convention: "ros_camera_link"
    # Predict eye-in-hand camera view for each strict 6D candidate. The target
    # must remain in a safe image region at pregrasp and approach.
    # Current camera optical axis is nearly perpendicular to the gripper
    # approach axis, so strict gating would reject every valid grasp. Keep the
    # projection as a diagnostic until the camera is remounted toward the jaws.
    camera_visibility_gate_enabled: false
    camera_visibility_diagnostic_enabled: true
    camera_visibility_require_approach: true
    camera_visibility_margin_px: 36
    camera_visibility_min_depth_m: 0.035
    camera_visibility_max_depth_m: 1.20
    camera_visibility_rank_weight_m: 0.012
    # Diagnostic mode: GraspNet predicted width is kept as information only.
    # Set this >0 later to reject poses wider than the real gripper.
    # The real gripper opening is still limited by /gripper/open_position_m.
    max_gripper_width_m: 0.0
    candidate_width_tolerance_m: 0.0

mujoco_digital_twin:
  enabled: true
  # Diagnostic mode: keep the WSL MuJoCo endpoint available, but do not block
  # real-arm execution while the digital twin IK is being tuned.
  execution_gate_enabled: false
  server_url: "http://172.23.132.97:8000"
  timeout_sec: 20.0
  min_score: 80
  allow_execution_on_error: false
  require_object_pose: true
  # Route A: WSL 自己推理、自己仿真；ROS 端在 /simulate_grasp
  # 请求里携带当前 /joint_states，WSL 不需要加入 ROS 网络。
  send_joint_state_in_request: true
  open_width_m: 0.05
  close_width_m: 0.0
  object_model:
    type: "mouse_compound"
    label: "mouse"
    size_xyz_m: [0.10, 0.06, 0.035]
    mass_kg: 0.08
    # 如果你有低面数鼠标 mesh，可改成：
    # type: "mouse_mesh"
    # mesh_path: "/home/lv/grasp6d_ws/assets/mouse_collision.obj"
    # mesh_scale: [1.0, 1.0, 1.0]
