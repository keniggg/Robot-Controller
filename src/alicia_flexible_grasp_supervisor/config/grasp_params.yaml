grasp:
  use_grasp6d_plan: true
  grasp6d_plan_topic: "/grasp_6d/plan"
  grasp6d_plan_max_age_sec: 30.0
  pregrasp_distance_m: 0.08
  pregrasp_offset_mode: "camera_ray"
  final_approach_offset_m: 0.015
  approach_step_m: 0.002
  approach_rate_hz: 10
  lift_height_m: 0.05
  timeout_sec: 25.0
  default_orientation_xyzw: [0.0, 0.7071, 0.0, 0.7071]
  pregrasp_reached_tolerance_m: 0.04
  motion_settle_min_sec: 0.8
  motion_settle_timeout_sec: 2.0
  motion_settle_sample_sec: 0.05
  motion_settle_position_epsilon_rad: 0.0025
  motion_settle_required_samples: 3
  min_object_confidence: 0.50
  max_object_jump_m: 0.12
  object_jump_filter_window_sec: 4.0
  max_locked_target_refine_m: 0.06
  # 6D 抓取必须执行模型给出的姿态；若 MoveIt 只能通过“当前姿态/候选姿态”
  # 兜底规划成功，则认为该 6D 抓取姿态不可执行，避免到达目标但夹爪姿态错误。
  accept_orientation_fallback: false

force:
  contact_threshold_mn: 200.0
  target_force_mn: 1500.0
  max_force_mn: 4000.0
  hold_force_min_mn: 800.0
  slip_drop_ratio: 0.30

gripper:
  # Alicia-D real gripper reports 0.05 m at the physically open posture and
  # 0.0 m at the closed posture.
  open_position_m: 0.05
  close_limit_m: 0.0
  close_step_fast_m: 0.002
  close_step_slow_m: 0.0007
  open_step_safe_m: 0.003
  command_rate_hz: 25
  # 夹爪未完成力/位置标定前，先使用固定开合，不走电子皮肤柔顺闭合。
  use_compliant_close: false
  simple_close_position_m: 0.0
  simple_close_wait_sec: 0.8
  open_wait_sec: 1.0
  hold_arm_during_gripper_commands: true
  arm_hold_timeout_sec: 0.5
  require_tactile_feedback: true
  tactile_feedback_timeout_sec: 1.0

grasp_6d:
  enabled: true
  backend: "remote_graspnet_baseline"
  root: ""
  checkpoint_path: ""
  device: "cpu"
  seed_feat_dim: 512
  num_points: 50000
  voxel_size: 0.005
  plan_hz: 1.0
  collision_thresh: 0.05
  collision_voxel_size: 0.01
  tactile_weight: 0.2
  remote:
    server_url: "http://172.23.132.97:8000"
    timeout_sec: 30.0
    auto_request: false
    request_hz: 0.05
    max_candidates: 6
    failure_backoff_sec: 10.0
    # GraspNet baseline predicts in OpenCV optical camera coordinates:
    # x right, y down, z forward. ROS-side planning uses camera_link.
    candidate_frame_convention: "opencv_optical"
    # 远程 6D 候选的可达性检查也必须坚持原始 6D 姿态。
    accept_orientation_fallback: false
    # Use the current perception target bbox to mask RGB-D before remote 6D
    # inference; otherwise GraspNet may propose grasps on the table/background.
    use_perception_roi: true
    require_perception_roi: true
    perception_roi_margin_px: 20
    perception_roi_max_age_sec: 1.0
    perception_roi_min_valid_depth_px: 250
    # Reject remote 6D grasps that are reachable but do not land near the
    # current YOLO/perception target. This prevents table/background candidates
    # from being executed when the mouse bbox is large or includes clutter.
    candidate_target_gate_enabled: true
    candidate_max_target_distance_m: 0.025
    candidate_min_relative_z_m: -0.015
    candidate_max_relative_z_m: 0.08

mujoco_digital_twin:
  enabled: true
  execution_gate_enabled: true
  server_url: "http://172.23.132.97:8000"
  timeout_sec: 20.0
  min_score: 80
  allow_execution_on_error: false
  require_object_pose: true
  # Route A: WSL 自己推理、自己仿真；ROS 端把执行前的计划发给
  # WSL /simulate_grasp，WSL 可通过 --ros-sync-joint-states 自己订阅 /joint_states。
  send_joint_state_in_request: false
  open_width_m: 0.05
  close_width_m: 0.0
  object_model:
    type: "mouse_compound"
    label: "mouse"
    size_xyz_m: [0.10, 0.06, 0.035]
    mass_kg: 0.08
    # 如果你有低面数鼠标 mesh，可改成：
    # type: "mouse_mesh"
    # mesh_path: "/home/lv/grasp6d_ws/assets/mouse_collision.obj"
    # mesh_scale: [1.0, 1.0, 1.0]
